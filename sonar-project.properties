# SonarQube Configuration for Gemara Content Service
sonar.projectKey=rh-psce_gemara-content-service
sonar.organization=rh-psce

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=gemara-content-service
sonar.projectVersion=1.0

# Source configuration
sonar.sources=.
sonar.tests=.

# Global settings
sonar.exclusions=**/*_test.go,**/vendor/**,**/api/*.gen.go,**/hack/**
sonar.test.inclusions=**/*_test.go

# Go specific settings
sonar.go.coverage.reportPaths=coverage.out

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage settings
sonar.coverage.exclusions=**/*_test.go,**/cmd/**,**/api/*.gen.go,**/hack/**
